name: Build CAP 6 complete APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      - name: Reconstruct complete sources
        run: bash scripts/reconstruct_sources.sh
      - name: Tests, lint and APK
        run: gradle --stacktrace testDebugUnitTest lintDebug assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CAP6-1.0.0-complete
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Verify APK signature
        run: "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs app/build/outputs/apk/debug/app-debug.apk
