name: Build CAP 6 complete APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_target:
    types: [opened, reopened, synchronize]
  issues:
    types: [opened]
  workflow_run:
    workflows: ["Build CAP 6 APK"]
    types: [completed]
  schedule:
    - cron: '34 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  android:
    if: github.event_name != 'issues' || startsWith(github.event.issue.title, 'BUILD CAP 6')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'
      - name: Reconstruct complete sources
        run: bash scripts/reconstruct_sources.sh
      - name: Tests, lint and APK
        run: gradle --stacktrace testDebugUnitTest lintDebug assembleDebug
      - name: Verify APK signature
        run: "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs app/build/outputs/apk/debug/app-debug.apk
      - name: Prepare release files
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk CAP6-1.0.0.apk
          sha256sum CAP6-1.0.0.apk > CAP6-1.0.0.apk.sha256
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CAP6-1.0.0-complete
          path: |
            CAP6-1.0.0.apk
            CAP6-1.0.0.apk.sha256
          if-no-files-found: error
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view cap6-1.0.0 >/dev/null 2>&1; then
            gh release upload cap6-1.0.0 CAP6-1.0.0.apk CAP6-1.0.0.apk.sha256 --clobber
          else
            gh release create cap6-1.0.0 CAP6-1.0.0.apk CAP6-1.0.0.apk.sha256 --target main --title "CAP 6 1.0.0" --notes "Application Android complète CAP 6 1.0.0. Les données nautiques non officielles restent signalées dans l'application."
          fi
      - name: Report build success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 7 --body "✅ CAP 6 1.0.0 a été compilé, testé, signé en debug et publié dans les Releases."
      - name: Report build failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 7 --body "❌ La compilation CAP 6 1.0.0 a échoué. Consultez le dernier workflow Actions pour le journal complet."
