name: CAP 6 1.1.0 controlled build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout application
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Reconstruct sources
        run: bash scripts/reconstruct_sources.sh

      - name: Tests, lint and APK
        run: gradle --stacktrace testDebugUnitTest lintDebug assembleDebug

      - name: Verify APK signature
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk CAP6-1.1.0.apk
          sha256sum CAP6-1.1.0.apk > CAP6-1.1.0.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CAP6-1.1.0
          path: |
            CAP6-1.1.0.apk
            CAP6-1.1.0.apk.sha256
          if-no-files-found: error
